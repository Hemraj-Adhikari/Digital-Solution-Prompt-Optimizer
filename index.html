<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Solution | Prompt Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-gray-200 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-3xl w-full bg-zinc-900 border border-zinc-800 rounded-2xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="bg-zinc-800/50 p-6 border-b border-zinc-800 text-center">
            <h1 class="text-3xl font-bold text-white tracking-tight">Prompt Optimizer</h1>
            <p class="text-sm text-zinc-400 mt-2">Powered by Digital Solution</p>
        </div>

        <!-- Body -->
        <div class="p-8 space-y-6">
            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-2">Subject / Character</label>
                <input type="text" id="subject" placeholder="e.g., A professional man in a dark coat with black shoes..." 
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-white focus:outline-none focus:border-amber-500 transition-colors">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">Art Style</label>
                    <select id="style" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-white focus:outline-none focus:border-amber-500">
                        <option value="cinematic portrait">Cinematic Portrait</option>
                        <option value="editorial style">Editorial Style</option>
                        <option value="minimalist studio">Minimalist Studio</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">Lighting & Tone</label>
                    <select id="lighting" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-white focus:outline-none focus:border-amber-500">
                        <option value="dramatic shadow falloff, golden and moody tones">Dramatic Shadow & Moody Golden</option>
                        <option value="soft studio lighting, neutral tones">Soft Studio Lighting</option>
                        <option value="neon cyberpunk lighting">Neon Cyberpunk</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-zinc-400 mb-2">Resolution & Quality</label>
                <input type="text" id="quality" value="8k ultra-realistic, highly detailed, photorealistic, masterpiece" 
                    class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-3 text-white focus:outline-none focus:border-amber-500 transition-colors">
            </div>

            <button onclick="generatePrompt()" class="w-full bg-amber-600 hover:bg-amber-500 text-zinc-950 font-bold py-3 px-4 rounded-lg transition-all transform hover:scale-[1.02]">
                Generate Prompt
            </button>
        </div>

        <!-- Output Section -->
        <div class="bg-zinc-950 p-6 border-t border-zinc-800">
            <label class="block text-sm font-medium text-amber-500 mb-2">Final Optimized Prompt:</label>
            <textarea id="output" rows="4" readonly 
                class="w-full bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-white resize-none focus:outline-none"></textarea>
            <button onclick="copyText()" class="mt-3 text-sm text-zinc-400 hover:text-white transition-colors flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                Copy to Clipboard
            </button>
        </div>
    </div>

    <script>
        function generatePrompt() {
            const subject = document.getElementById('subject').value || 'A mystery figure';
            const style = document.getElementById('style').value;
            const lighting = document.getElementById('lighting').value;
            const quality = document.getElementById('quality').value;
            
            const finalPrompt = `${subject}, ${style}, ${lighting}, ${quality}. Add 'Digital Solution' watermark subtly at the bottom center.`;
            document.getElementById('output').value = finalPrompt;
        }

        function copyText() {
            const output = document.getElementById('output');
            output.select();
            document.execCommand('copy');
            alert('Prompt Copied!');
        }
    </script>
</body>
</html>
